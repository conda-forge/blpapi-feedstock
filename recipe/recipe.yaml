context:
  name: blpapi
  version: "3.26.3.1"
  blpapicpp_linux_version: ${{ version }}
  blpapicpp_win_version: ${{ version }}
  blpapicpp_osx_version: ${{ version }}

recipe:
  name: blpapi-split
  version: ${{ version }}

source:
  - url: https://blpapi.bloomberg.com/repository/releases/python/${{ name }}-${{ version }}.tar.gz
    sha256: 984cc5986d11d106400280dd42f47c18a0ab34693961f2cc9710542db0fbe58c
  - if: linux
    then:
      url: https://blpapi.bloomberg.com/download/releases/raw/files/blpapi_cpp_${{ blpapicpp_linux_version }}-linux.tar.gz
      sha256: af0d9f0cadf1f90b1f1a633baf9e33507f28ccc7916f60b2e8f42e5cc2133cf2
      target_directory: blpapi
  - if: win
    then:
      url: https://blpapi.bloomberg.com/download/releases/raw/files/blpapi_cpp_${{ blpapicpp_win_version }}-windows.zip
      sha256: 73bbe9a1cefe2b6dd5f54cc8300603537208d54ab7c4414ca8b24edef2ff195b
      target_directory: blpapi
  - if: osx and arm64
    then:
      url: https://blpapi.bloomberg.com/download/releases/raw/files/blpapi_cpp_${{ blpapicpp_osx_version }}-macos-arm64.tar.gz
      sha256: 321b9883d57bd185a775aec5281d686c672b6d6fa65d4ecf748a82ce6d4a42b8
      target_directory: blpapi

build:
  number: 0
  skip: osx and x86_64

outputs:
  - package:
      name: libblpapi
      version: ${{ version }}
    build:
      script:
        - if: unix
          then: build-lib.sh
          else: build-lib.bat
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - ${{ stdlib("c") }}
      run_exports:
        - ${{ pin_subpackage('libblpapi', upper_bound='x.x.x.x') }}
    tests:
      - script:
          - if: unix
            then:
              - test -f $PREFIX/lib/libblpapi3_64.so || test -f $PREFIX/lib/libblpapi3_64.dylib
            else:
              - if exist %LIBRARY_PREFIX%\bin\blpapi3_64.dll (exit 0) else (exit 1)

  - package:
      name: libblpapi-devel
      version: ${{ version }}
    build:
      script:
        - if: unix
          then: build-devel.sh
          else: build-devel.bat
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - ${{ stdlib("c") }}
      host:
        - ${{ pin_subpackage('libblpapi', exact=True) }}
      run:
        - ${{ pin_subpackage('libblpapi', exact=True) }}
    tests:
      - script:
          - if: unix
            then:
              - test -f $PREFIX/include/blpapi_session.h
              - test -d $PREFIX/lib/cmake/blpapi || true
            else:
              - if exist %LIBRARY_PREFIX%\include\blpapi_session.h (exit 0) else (exit 1)
              - if exist %LIBRARY_PREFIX%\lib\blpapi3_64.lib (exit 0) else (exit 1)

  - package:
      name: blpapi
      version: ${{ version }}
    build:
      script:
        - if: unix
          then: build-py.sh
          else: build-py.bat
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - ${{ stdlib("c") }}
        - if: build_platform != target_platform
          then:
            - python
            - cross-python_${{ target_platform }}
      host:
        - python
        - setuptools
        - pip
        - ${{ pin_subpackage('libblpapi-devel', exact=True) }}
      run:
        - python
        - ${{ pin_subpackage('libblpapi', exact=True) }}
    tests:
      - python:
          imports:
            - blpapi
          pip_check: false

about:
  license: LicenseRef-Bloomberg-BLPAPI
  license_file: License.txt
  summary: Python SDK for Bloomberg BLPAPI
  homepage: https://www.bloomberg.com/professional/support/api-library/

extra:
  recipe-maintainers:
    - reggied
    - matthewgilbert
    - adament
    - benmoss
